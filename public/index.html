<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alfresco Files</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #172033;
      --muted: #647084;
      --border: #d9dee7;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --danger: #b42318;
      --row: #fbfcfe;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }

    .subhead {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 22px auto 40px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 0.85fr) minmax(190px, 0.9fr) minmax(220px, 1fr) 120px auto auto;
      gap: 10px;
      align-items: end;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, button {
      height: 38px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font: inherit;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
    }

    button {
      padding: 0 14px;
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { background: var(--accent-dark); }
    button.secondary { background: #fff; color: var(--accent-dark); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 14px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status strong { color: var(--text); }
    .error { color: var(--danger); }

    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
    }

    th {
      background: #eef2f6;
      font-weight: 700;
      color: #344054;
    }

    tbody tr:nth-child(even) { background: var(--row); }
    tbody tr:last-child td { border-bottom: 0; }

    .name {
      overflow-wrap: anywhere;
      font-weight: 600;
    }

    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { color: var(--muted); }

    a {
      color: var(--accent-dark);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .pager {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }

    .empty {
      padding: 34px 12px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      header { padding: 16px; }
      main { width: calc(100% - 20px); margin-top: 14px; }
      .toolbar { grid-template-columns: 1fr; }
      .status { flex-direction: column; }
      table { min-width: 760px; }
      .table-wrap { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <h1>รายการไฟล์ Alfresco</h1>
    <div class="subhead" id="folderPath">/Sites/tg-saving/documentLibrary/การเงิน</div>
  </header>

  <main>
    <section class="toolbar" aria-label="ค้นหาไฟล์">
      <div>
        <label for="apiToken">Bearer token</label>
        <input id="apiToken" type="password" placeholder="ใส่ token จาก .env" autocomplete="off">
      </div>
      <div>
        <label for="folderSelect">เลือกโฟลเดอร์</label>
        <select id="folderSelect">
          <option value="/Sites/tg-saving/documentLibrary/การเงิน">การเงิน</option>
        </select>
      </div>
      <div>
        <label for="keyword">ค้นหาชื่อไฟล์</label>
        <input id="keyword" type="search" placeholder="เช่น 026277, 38849, .pdf" autocomplete="off">
      </div>
      <div>
        <label for="pageSize">จำนวนต่อหน้า</label>
        <select id="pageSize">
          <option value="50">50</option>
          <option value="100" selected>100</option>
          <option value="250">250</option>
          <option value="500">500</option>
        </select>
      </div>
      <button id="searchBtn" type="button">ค้นหา</button>
      <button id="clearBtn" class="secondary" type="button">ล้าง</button>
    </section>

    <div class="status">
      <div id="summary">กำลังโหลดข้อมูล...</div>
      <div id="pageInfo"></div>
    </div>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width: 56px;">#</th>
            <th>ชื่อไฟล์</th>
            <th style="width: 110px;">ขนาด</th>
            <th style="width: 170px;">วันที่สร้าง</th>
            <th style="width: 120px;">เปิดไฟล์</th>
          </tr>
        </thead>
        <tbody id="fileRows">
          <tr><td colspan="5" class="empty">กำลังโหลดข้อมูล...</td></tr>
        </tbody>
      </table>
    </section>

    <nav class="pager" aria-label="แบ่งหน้า">
      <button id="prevBtn" class="secondary" type="button">ก่อนหน้า</button>
      <button id="nextBtn" type="button">ถัดไป</button>
    </nav>
  </main>

  <script>
    const documentLibraryPath = "/Sites/tg-saving/documentLibrary";
    const defaultFolderPath = `${documentLibraryPath}/การเงิน`;
    let folderPath = defaultFolderPath;

    const state = {
      q: "",
      maxItems: 100,
      skipCount: 0,
      total: 0,
      hasMoreItems: false,
      loading: false,
    };

    const els = {
      apiToken: document.getElementById("apiToken"),
      folderSelect: document.getElementById("folderSelect"),
      folderPath: document.getElementById("folderPath"),
      keyword: document.getElementById("keyword"),
      pageSize: document.getElementById("pageSize"),
      searchBtn: document.getElementById("searchBtn"),
      clearBtn: document.getElementById("clearBtn"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      summary: document.getElementById("summary"),
      pageInfo: document.getElementById("pageInfo"),
      rows: document.getElementById("fileRows"),
    };

    function getApiToken() {
      const token = els.apiToken.value.trim();

      if (token) {
        sessionStorage.setItem("alfrescoApiToken", token);
      }

      return token;
    }

    function authHeaders() {
      const token = getApiToken();
      return token ? { Authorization: `Bearer ${token}` } : {};
    }

    async function fetchJson(url) {
      const res = await fetch(url, { headers: authHeaders() });
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || "โหลดข้อมูลไม่สำเร็จ");
      }

      return data;
    }

    async function openDocument(url, fileName) {
      try {
        const res = await fetch(url, { headers: authHeaders() });

        if (!res.ok) {
          let message = "เปิดไฟล์ไม่สำเร็จ";
          try {
            const error = await res.json();
            message = error.message || message;
          } catch (err) {}
          throw new Error(message);
        }

        const blob = await res.blob();
        const objectUrl = URL.createObjectURL(blob);
        window.open(objectUrl, "_blank", "noopener");
        setTimeout(() => URL.revokeObjectURL(objectUrl), 60000);
      } catch (err) {
        alert(err.message);
      }
    }
    function formatBytes(bytes) {
      if (!Number.isFinite(Number(bytes))) return "-";
      const value = Number(bytes);
      if (value < 1024) return `${value} B`;
      if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
      return `${(value / 1024 / 1024).toFixed(1)} MB`;
    }

    function formatDate(ms) {
      if (!ms) return "-";
      return new Intl.DateTimeFormat("th-TH", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      }).format(new Date(Number(ms)));
    }

    function setLoading(loading) {
      state.loading = loading;
      els.apiToken.disabled = loading;
      els.folderSelect.disabled = loading;
      els.searchBtn.disabled = loading;
      els.clearBtn.disabled = loading;
      els.prevBtn.disabled = loading || state.skipCount === 0;
      els.nextBtn.disabled = loading || !state.hasMoreItems;
    }

    function buildUrl() {
      const params = new URLSearchParams({
        folderPath: folderPath,
        maxItems: String(state.maxItems),
        skipCount: String(state.skipCount),
      });

      if (state.q) {
        params.set("q", state.q);
        return `/api/alfresco/documents?${params.toString()}`;
      }

      return `/api/alfresco/documents?${params.toString()}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function loadFolders() {
      try {
        const params = new URLSearchParams({ path: documentLibraryPath });
        const folders = await fetchJson(`/api/alfresco/folders?${params.toString()}`);

        const options = folders
          .filter((item) => item.isFolder && item.path)
          .sort((a, b) => (a.name || "").localeCompare(b.name || "", "th"))
          .map((folder) => {
            const selected = folder.path === defaultFolderPath ? " selected" : "";
            return `<option value="${escapeHtml(folder.path)}"${selected}>${escapeHtml(folder.name)}</option>`;
          })
          .join("");

        els.folderSelect.innerHTML = options || `<option value="${defaultFolderPath}">การเงิน</option>`;
        folderPath = els.folderSelect.value || defaultFolderPath;
        els.folderPath.textContent = folderPath;
      } catch (err) {
        els.folderSelect.innerHTML = `<option value="${defaultFolderPath}">การเงิน</option>`;
        folderPath = defaultFolderPath;
        els.folderPath.textContent = folderPath;
      }
    }

    function renderRows(files) {
      if (!files.length) {
        els.rows.innerHTML = '<tr><td colspan="5" class="empty">ไม่พบไฟล์</td></tr>';
        return;
      }

      els.rows.innerHTML = files.map((file, index) => {
        const rowNumber = state.skipCount + index + 1;
        const downloadUrl = file.downloadUrl || "#";
        return `
          <tr>
            <td class="num">${rowNumber}</td>
            <td class="name">${escapeHtml(file.name || "-")}</td>
            <td class="num muted">${formatBytes(file.size)}</td>
            <td class="muted">${formatDate(file.creationDate)}</td>
            <td><button class="secondary" type="button" data-download-url="${escapeHtml(downloadUrl)}" data-file-name="${escapeHtml(file.name || "download")}">เปิด</button></td>
          </tr>
        `;
      }).join("");
    }

    async function loadFiles() {
      setLoading(true);
      els.summary.textContent = "กำลังโหลดข้อมูล...";
      els.pageInfo.textContent = "";

      try {
        const data = await fetchJson(buildUrl());

        state.total = data.total || 0;
        state.hasMoreItems = Boolean(data.hasMoreItems);

        renderRows(data.files || []);

        const mode = state.q ? `ผลค้นหา "${state.q}"` : "ไฟล์ทั้งหมด";
        els.summary.innerHTML = `<strong>${mode}</strong> แสดง ${data.count || 0} จากทั้งหมด ${state.total.toLocaleString("th-TH")} รายการ`;
        els.pageInfo.textContent = `เริ่มที่ ${state.skipCount.toLocaleString("th-TH")} | ต่อหน้า ${state.maxItems}`;
      } catch (err) {
        els.rows.innerHTML = '<tr><td colspan="5" class="empty error">โหลดข้อมูลไม่สำเร็จ</td></tr>';
        els.summary.innerHTML = `<span class="error">${err.message}</span>`;
      } finally {
        setLoading(false);
      }
    }

    function runSearch() {
      folderPath = els.folderSelect.value || defaultFolderPath;
      els.folderPath.textContent = folderPath;
      state.q = els.keyword.value.trim();
      state.maxItems = Number(els.pageSize.value);
      state.skipCount = 0;
      loadFiles();
    }

    els.rows.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-download-url]");

      if (!button) return;

      openDocument(button.dataset.downloadUrl, button.dataset.fileName);
    });

    els.apiToken.value = sessionStorage.getItem("alfrescoApiToken") || "";
    els.apiToken.addEventListener("change", () => {
      sessionStorage.setItem("alfrescoApiToken", els.apiToken.value.trim());
      state.skipCount = 0;
      loadFolders().then(loadFiles);
    });

    els.folderSelect.addEventListener("change", () => {
      els.keyword.value = "";
      runSearch();
    });
    els.searchBtn.addEventListener("click", runSearch);
    els.keyword.addEventListener("keydown", (event) => {
      if (event.key === "Enter") runSearch();
    });
    els.pageSize.addEventListener("change", runSearch);
    els.clearBtn.addEventListener("click", () => {
      els.keyword.value = "";
      runSearch();
    });
    els.prevBtn.addEventListener("click", () => {
      state.skipCount = Math.max(0, state.skipCount - state.maxItems);
      loadFiles();
    });
    els.nextBtn.addEventListener("click", () => {
      state.skipCount += state.maxItems;
      loadFiles();
    });

    loadFolders().then(loadFiles);
  </script>
</body>
</html>
